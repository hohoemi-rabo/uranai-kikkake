<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>占いキッカケに戻ります</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      background: #F5F3FF;
      color: #0F172A;
      text-align: center;
      padding: 48px 24px;
      line-height: 1.8;
      font-size: 18px;
    }
    a {
      display: inline-block;
      margin-top: 24px;
      padding: 16px 32px;
      background: #FB7185;
      color: white;
      text-decoration: none;
      border-radius: 16px;
      font-weight: bold;
    }
    p { margin: 16px 0; }
  </style>
</head>
<body>
  <p>占いキッカケに戻ります…</p>
  <p id="manual" style="display:none">
    <a id="manual-link" href="#">タップしてアプリに戻る</a>
  </p>
  <script>
    (function () {
      var query = window.location.search.slice(1);
      var target = 'uranaikikkake://oauth/google/callback' + (query ? '?' + query : '');
      // 即時リダイレクト
      try {
        window.location.replace(target);
      } catch (e) {
        // fallback: manual link
      }
      // 1.5 秒後にもアプリが戻らなければ手動リンクを表示
      setTimeout(function () {
        var link = document.getElementById('manual-link');
        var manual = document.getElementById('manual');
        if (link && manual) {
          link.href = target;
          manual.style.display = 'block';
        }
      }, 1500);
    })();
  </script>
</body>
</html>
