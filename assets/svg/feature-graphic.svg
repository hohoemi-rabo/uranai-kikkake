<svg viewBox="0 0 1024 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 濃紺グラデ(アプリ画面の ScreenBackground と統一) -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="55%" stop-color="#4C1D95"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDE047"/>
      <stop offset="60%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <symbol id="sparkle" viewBox="-200 -200 400 400">
      <path d="M 0 -180 C 0 -60, 40 -40, 180 0 C 40 40, 0 60, 0 180 C 0 60, -40 40, -180 0 C -40 -40, 0 -60, 0 -180 Z"/>
    </symbol>
  </defs>

  <!-- 背景 -->
  <rect width="1024" height="500" fill="url(#bgGrad)"/>

  <!-- 装飾の小スパーク -->
  <use href="#sparkle" x="60" y="60" width="50" height="50" fill="#FDE047" opacity="0.7"/>
  <use href="#sparkle" x="180" y="380" width="40" height="40" fill="#FDE047" opacity="0.55"/>
  <use href="#sparkle" x="500" y="50" width="55" height="55" fill="#FDE047" opacity="0.7"/>
  <use href="#sparkle" x="980" y="390" width="35" height="35" fill="#FDE047" opacity="0.5"/>

  <!-- 左: アプリ名 + サブタイトル(濃紺背景上なので白系) -->
  <text x="80" y="240"
        font-family="Rounded Mplus 1c Black, sans-serif"
        font-size="96" font-weight="900" fill="#F8FAFC">占いキッカケ</text>
  <text x="80" y="310"
        font-family="Rounded Mplus 1c, sans-serif"
        font-size="36" font-weight="400" fill="#CBD5E1">会話がもっと楽しくなる</text>

  <!-- 右: 大きな「占」(ゴールド) -->
  <text x="870" y="370"
        font-family="Rounded Mplus 1c Black, sans-serif"
        font-size="380" font-weight="900"
        fill="url(#goldGrad)" text-anchor="middle">占</text>
</svg>
