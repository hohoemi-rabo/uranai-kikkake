<svg viewBox="0 0 1024 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="starGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FB7185"/>
      <stop offset="50%" stop-color="#FB923C"/>
      <stop offset="100%" stop-color="#2DD4BF"/>
    </linearGradient>
  </defs>

  <!-- クリーム背景 -->
  <rect width="1024" height="500" fill="#F8F1E5"/>

  <!-- 装飾の小スパーク -->
  <circle cx="180" cy="100" r="5" fill="#FB7185" opacity="0.5"/>
  <circle cx="320" cy="400" r="4" fill="#2DD4BF" opacity="0.5"/>
  <circle cx="500" cy="90" r="6" fill="#FB923C" opacity="0.5"/>
  <circle cx="570" cy="420" r="4" fill="#FB7185" opacity="0.5"/>
  <circle cx="720" cy="80" r="5" fill="#2DD4BF" opacity="0.5"/>
  <circle cx="950" cy="420" r="4" fill="#FB923C" opacity="0.5"/>

  <!-- 左: アプリ名 + サブタイトル -->
  <text x="80" y="240"
        font-family="Rounded Mplus 1c Black, sans-serif"
        font-size="96" font-weight="900" fill="#0F172A">占いキッカケ</text>
  <text x="80" y="310"
        font-family="Rounded Mplus 1c, sans-serif"
        font-size="36" font-weight="400" fill="#64748B">会話がもっと楽しくなる</text>

  <!-- 右: 大きな 4 点星 -->
  <g transform="translate(840, 250)">
    <path d="M 0 -180
             C 0 -60, 40 -40, 180 0
             C 40 40, 0 60, 0 180
             C 0 60, -40 40, -180 0
             C -40 -40, 0 -60, 0 -180 Z"
          fill="url(#starGrad)"/>
  </g>
</svg>
