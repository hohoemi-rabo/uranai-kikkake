<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 濃紺グラデ(アプリ画面の ScreenBackground と同じスタック) -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="55%" stop-color="#4C1D95"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </linearGradient>
    <!-- ゴールド(明 → 濃 で立体感) -->
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDE047"/>
      <stop offset="60%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <!-- スパーク用の 4 点星パスを定義(transform で配置) -->
    <symbol id="sparkle" viewBox="-200 -200 400 400">
      <path d="M 0 -180 C 0 -60, 40 -40, 180 0 C 40 40, 0 60, 0 180 C 0 60, -40 40, -180 0 C -40 -40, 0 -60, 0 -180 Z"/>
    </symbol>
  </defs>

  <!-- 背景: 濃紺グラデ -->
  <rect width="1024" height="1024" fill="url(#bgGrad)"/>

  <!-- 装飾の小スパーク(ゴールド、4 隅に控えめ配置) -->
  <use href="#sparkle" x="180" y="220" width="90" height="90" fill="#FDE047" opacity="0.75"/>
  <use href="#sparkle" x="780" y="180" width="120" height="120" fill="#FDE047" opacity="0.9"/>
  <use href="#sparkle" x="140" y="760" width="100" height="100" fill="#FDE047" opacity="0.7"/>
  <use href="#sparkle" x="820" y="790" width="75" height="75" fill="#FDE047" opacity="0.6"/>

  <!-- メイン: 「占」一文字、ゴールドグラデ -->
  <text x="512" y="700"
        font-family="Rounded Mplus 1c Black, sans-serif"
        font-size="640" font-weight="900"
        fill="url(#goldGrad)" text-anchor="middle">占</text>
</svg>
